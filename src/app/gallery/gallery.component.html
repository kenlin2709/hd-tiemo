<section class="gallery-hero">
  <div class="container">
    <h1>See Our Work</h1>
    <p>Discover real results from our professional film installations and detailing.</p>
  </div>
</section>

<section class="gallery-grid">
  <div class="gallery-item" *ngFor="let img of galleryImages">
    <img [src]="img.src" [alt]="img.alt" />
    <div class="overlay">
      <span>{{ img.alt }}</span>
    </div>
  </div>
</section>

<section class="gallery-cta">
  <h2>Interested in seeing more?</h2>
  <button (click)="openBooking()">Book a Demo</button>
</section>

<app-booking-modal #bookingModal (submitted)="handleBooking($event)"></app-booking-modal>
