<header class="site-header">
  <div class="top-bar">
    <div class="logo">
      <img src="assets/images/logo-gold.png" alt="HD Protectors Logo" />
      <span>HD Protectors</span>
    </div>
    <nav class="nav-links d-none d-lg-flex" [class.open]="isMobileMenuOpen">
      <a routerLink="/" (click)="closeMobileMenu()">Home</a>
      <a routerLink="/services" (click)="closeMobileMenu()">Services</a>
      <a routerLink="/gallery" (click)="closeMobileMenu()">Gallery</a>
      <a routerLink="/about" (click)="closeMobileMenu()">About</a>
      <a routerLink="/contact" (click)="closeMobileMenu()">Contact</a>
      <button (click)="openModal()">Book Now</button>
    </nav>
    <button class="menu-toggle d-lg-none" (click)="toggleMobileMenu()">
      <span>&#9776;</span>
    </button>
  </div>

  <nav class="nav-links d-lg-none" [class.open]="isMobileMenuOpen">
    <a routerLink="/" (click)="closeMobileMenu()">Home</a>
    <a routerLink="/services" (click)="closeMobileMenu()">Services</a>
    <a routerLink="/gallery" (click)="closeMobileMenu()">Gallery</a>
    <a routerLink="/about" (click)="closeMobileMenu()">About</a>
    <a routerLink="/contact" (click)="closeMobileMenu()">Contact</a>
    <button (click)="openModal()">Book Now</button>
  </nav>
</header>

<app-booking-modal #bookingModal (submitted)="handleBooking($event)"></app-booking-modal>
