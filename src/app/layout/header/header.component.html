<nav
  class="navbar navbar-expand-lg navbar-light bg-primary-dark shadow-sm sticky-top"
>
  <div class="container-fluid">
    <!-- Logo / Brand -->
    <a
      class="navbar-brand d-flex align-items-center me-5 me-md-3 me-lg-5"
      routerLink="/"
    >
      <img src="/assets/images/logo_origin.png" alt="Eternal logo" class="logo-img" />
      <img
        src="/assets/images/header_text_full.png"
        alt="Eternal logo"
        class="logo-img me-2"
      />
      <!-- <span class="fw-bold">Eternal</span> -->
    </a>

    <!-- Mobile toggle -->
    <button
      style="width: 40px;"
      class="navbar-toggler border-white navbar-dark d-flex d-lg-none justify-content-center align-items-center px-2"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarHeader"
      aria-controls="navbarHeader"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Collapsible nav -->
    <div class="collapse navbar-collapse" id="navbarHeader">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1 gap-md-0 gap-lg-4">
        @for (item of navItems; track $index) {
        <app-nav-link [item]="item"></app-nav-link>
        }
      </ul>

      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
        <app-language-switcher
          [currentLanguage]="currentLanguage"
          (languageChange)="changeLanguage($event)"
        ></app-language-switcher>
        <li class="nav-item">
          <a class="btn btn-primary ms-lg-3" routerLink="/contact-us">
            {{ "ENQUIRY" | translate }}
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
